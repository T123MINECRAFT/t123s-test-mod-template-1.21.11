name: Publish Mod on GitHub, Modrinth & CurseForge

on:
  release:
    types: [ published ]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build Mod
        run: ./gradlew clean build

      # ========== 新增：判断是否为预发布版 ==========
      - name: Determine prerelease status
        id: prerelease_check
        run: |
          TAG_NAME="${{ github.ref_name }}"
          # 转为小写然后匹配
          TAG_LOWER=$(echo "$TAG_NAME" | tr '[:upper:]' '[:lower:]')
          if [[ "$TAG_LOWER" =~ (beta|alpha|rc|pre) ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi
      # ===========================================

      - name: Publish to Platforms
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          files: |
            build/libs/*.jar

          github-token: ${{ secrets.GITHUB_TOKEN }}
          # 引用上一步的输出，并与字符串 'true' 比较得到布尔值
          github-prerelease: ${{ steps.prerelease_check.outputs.is_prerelease == 'true' }}

          modrinth-id: 5HrgYW5Z
          modrinth-token: mrp_KSQ5BHqe06EyUJGTIdciCoAUYewkTvmITlTBUV5ppXEn1qK5P4xDnTCpXbdf

          name: ${{ github.ref_name }}
          version: ${{ github.ref_name }}
          version-type: "${{ contains(github.ref_name, 'beta') && 'beta' || (contains(github.ref_name, 'alpha') && 'alpha' || 'release') }}"
          changelog-file: CHANGELOG.md
          loaders: |
            fabric
          game-versions: |
            1.21.11
          java: |
            Java 21