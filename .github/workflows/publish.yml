name: Publish Mod to GitHub Releases & Modrinth (Fabric)

on:
  push:
    tags:
      - '[0-9]+*'          # 匹配简洁标签，如 0.1.0-alpha.2

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Mod
        run: ./gradlew clean build

      - name: List built files
        id: list
        run: |
          ls -R build/libs/
          MAIN_JAR=$(ls build/libs/t123s_test_mod-*.jar | grep -v sources | grep -v javadoc | head -n1)
          if [ -z "$MAIN_JAR" ]; then
            echo "No main jar found"
            exit 1
          fi
          echo "jar_file=${MAIN_JAR}" >> $GITHUB_OUTPUT
          FULL_VERSION=$(basename "$MAIN_JAR" .jar | sed 's/^t123s_test_mod-//')
          echo "full_version=${FULL_VERSION}" >> $GITHUB_OUTPUT

      - name: Publish to Platforms
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          files: ${{ steps.list.outputs.jar_file }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') || contains(github.ref_name, 'pre') }}
          modrinth-id: 5HrgYW5Z
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          name: ${{ github.ref_name }}
          version: ${{ steps.list.outputs.full_version }}
          version-type: ${{ contains(github.ref_name, 'alpha') && 'alpha' || contains(github.ref_name, 'beta') && 'beta' || contains(github.ref_name, 'rc') && 'rc' || contains(github.ref_name, 'pre') && 'pre' || 'release' }}
          loaders: fabric
          game-versions: 1.21.*        # 请根据实际支持的版本修改
          java: Java 21