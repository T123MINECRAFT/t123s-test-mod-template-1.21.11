name: Publish Mod to GitHub Releases & Modrinth

on:
  push:
    tags:
      - '[0-9]+*'          # 匹配 X.Y.Z-alpha.x 格式

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Mod
        run: ./gradlew clean build

      - name: List built files
        id: list
        run: |
          ls -R build/libs/
          # 找到第一个非 sources/javadoc 的 jar 文件
          JAR_FILE=$(ls build/libs/t123s-test-mod-*.jar | grep -v sources | grep -v javadoc | head -n1)
          if [ -z "$JAR_FILE" ]; then
            echo "No main jar found!"
            exit 1
          fi
          echo "jar_file=${JAR_FILE}" >> $GITHUB_OUTPUT
          
          # 提取 loader 和 game version
          BASENAME=$(basename "$JAR_FILE" .jar)
          # 假设格式：t123s-test-mod-版本-loader+gameversion
          LOADER=$(echo "$BASENAME" | sed -E 's/.*-([a-z]+)\+.*/\1/')
          GAME_VERSION=$(echo "$BASENAME" | sed -E 's/.*\+//')
          echo "loader=${LOADER}" >> $GITHUB_OUTPUT
          echo "game_version=${GAME_VERSION}" >> $GITHUB_OUTPUT

      - name: Build version strings
        id: version_strings
        run: |
          TAG="${{ github.ref_name }}"
          LOADER="${{ steps.list.outputs.loader }}"
          GAME_VERSION="${{ steps.list.outputs.game_version }}"
          MODRINTH_VERSION="${TAG}-${LOADER}+${GAME_VERSION}"
          echo "modrinth_version=${MODRINTH_VERSION}" >> $GITHUB_OUTPUT

      - name: Publish to Platforms
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          files: ${{ steps.list.outputs.jar_file }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') || contains(github.ref_name, 'pre') }}
          modrinth-id: 5HrgYW5Z
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          name: ${{ github.ref_name }}
          version: ${{ steps.version_strings.outputs.modrinth_version }}
          version-type: ${{ contains(github.ref_name, 'alpha') && 'alpha' || contains(github.ref_name, 'beta') && 'beta' || contains(github.ref_name, 'rc') && 'rc' || contains(github.ref_name, 'pre') && 'pre' || 'release' }}
          loaders: ${{ steps.list.outputs.loader }}
          game-versions: ${{ steps.list.outputs.game_version }}
          java: Java 21